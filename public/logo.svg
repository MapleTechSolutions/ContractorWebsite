<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Badge background -->
  <rect width="100" height="100" rx="16" fill="#1a3548"/>

  <!-- Ground line -->
  <rect x="6" y="84" width="58" height="5" rx="2.5" fill="#2d4f64"/>

  <!-- Undercarriage / tracks -->
  <rect x="4" y="73" width="44" height="13" rx="6.5" fill="#2d4f64"/>
  <rect x="9"  y="77" width="34" height="5"  rx="0"   fill="#1a3548" opacity="0.45"/>
  <circle cx="11" cy="79" r="4.5" fill="#3d6882"/>
  <circle cx="43" cy="79" r="4.5" fill="#3d6882"/>

  <!-- Cab body -->
  <rect x="10" y="55" width="26" height="20" rx="4" fill="#2d4f64"/>
  <!-- Window -->
  <rect x="14" y="59" width="9" height="7" rx="2" fill="#F5A623" opacity="0.35"/>
  <!-- Counterweight bump -->
  <rect x="6"  y="60" width="6"  height="11" rx="3" fill="#1a3548"/>

  <!-- Swing bearing -->
  <circle cx="34" cy="66" r="5" fill="#1a3548"/>
  <circle cx="34" cy="66" r="2.5" fill="#3d6882"/>

  <!-- Main boom arm -->
  <line x1="33" y1="61" x2="62" y2="24"
        stroke="#F5A623" stroke-width="8" stroke-linecap="round"/>

  <!-- Boom hydraulic cylinder -->
  <line x1="37" y1="57" x2="56" y2="34"
        stroke="#b87d1a" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- Dipper / stick arm -->
  <line x1="62" y1="24" x2="84" y2="48"
        stroke="#F5A623" stroke-width="6.5" stroke-linecap="round"/>

  <!-- Stick hydraulic cylinder -->
  <line x1="65" y1="28" x2="78" y2="44"
        stroke="#b87d1a" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Bucket (open scoop) -->
  <path d="M80 44 L96 56 L90 70 L72 66 Z" fill="#F5A623"/>
  <!-- Bucket curl / lip -->
  <path d="M90 70 Q84 75 73 70" stroke="#b87d1a" stroke-width="2.5"
        fill="none" stroke-linecap="round"/>
  <!-- Bucket teeth -->
  <line x1="88" y1="69" x2="91" y2="75" stroke="#b87d1a" stroke-width="2" stroke-linecap="round"/>
  <line x1="82" y1="71" x2="84" y2="77" stroke="#b87d1a" stroke-width="2" stroke-linecap="round"/>
  <line x1="76" y1="70" x2="77" y2="76" stroke="#b87d1a" stroke-width="2" stroke-linecap="round"/>

  <!-- Snowflake (upper-right — snow removal service hint) -->
  <g transform="translate(62, 6)" opacity="0.85">
    <line x1="9" y1="0"  x2="9"  y2="18" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="0" y1="9"  x2="18" y2="9"  stroke="white" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="2.6" y1="2.6" x2="15.4" y2="15.4" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="15.4" y1="2.6" x2="2.6" y2="15.4" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="9"  y1="5"  x2="6"  y2="2"  stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="9"  y1="5"  x2="12" y2="2"  stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="9"  y1="13" x2="6"  y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="9"  y1="13" x2="12" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4"  y1="9"  x2="2"  y2="6"  stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4"  y1="9"  x2="2"  y2="12" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="14" y1="9"  x2="16" y2="6"  stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="14" y1="9"  x2="16" y2="12" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
